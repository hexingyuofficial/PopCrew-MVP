<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>制片人控制台 · PopCrew</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "-apple-system",
                "BlinkMacSystemFont",
                '"SF Pro Text"',
                '"Segoe UI"',
                "Roboto",
                "Helvetica",
                "Arial",
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f5f5f7;
        color: #1d1d1f;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var day = "today";
        var groups = [
          {
            id: "g_xp",
            name: "制片-小胖",
            tasks: [
              {
                id: "t1",
                title: "联系犀浦废弃工厂确认电力负荷",
                status: 2,
                carriedOver: true,
              },
            ],
          },
          {
            id: "g_soda",
            name: "导演-Soda",
            tasks: [
              { id: "t2", title: "提交分镜脚本 V2 版", status: 3 },
            ],
          },
          {
            id: "g_aq",
            name: "灯光-阿强",
            tasks: [
              { id: "t3", title: "清点阿莱灯阵并装车", status: 1 },
            ],
          },
        ];

        function uid() {
          return "t_" + Math.random().toString(36).slice(2, 11);
        }
        function nextStatus(s) {
          if (s === 1) return 2;
          if (s === 2) return 3;
          return 1;
        }

        function iconCircle() {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="text-zinc-300"><circle cx="12" cy="12" r="10"/></svg>';
        }
        function iconCheckCircle2() {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-amber-600"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 12 2 2 4-4"/></svg>';
        }
        function iconCheck() {
          return '<span class="flex h-5 w-5 items-center justify-center rounded-full bg-white/20"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="text-white"><path d="M20 6 9 17l-5-5"/></svg></span>';
        }
        function iconBot() {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>';
        }
        function iconPlus() {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>';
        }
        function iconX() {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>';
        }

        function shellClass(status) {
          if (status === 1)
            return "border border-zinc-200/90 bg-white shadow-[0_1px_2px_rgba(0,0,0,0.04)]";
          if (status === 2)
            return "border border-amber-200/80 bg-gradient-to-br from-amber-50/95 via-lime-50/60 to-white shadow-[0_1px_3px_rgba(217,119,6,0.08)]";
          return "border border-emerald-900/20 bg-emerald-800 text-white shadow-[0_4px_20px_rgba(6,78,59,0.35)]";
        }

        function render() {
          var root = document.getElementById("root");
          var dayBtns = [
            { key: "yesterday", label: "昨日" },
            { key: "today", label: "今日" },
            { key: "tomorrow", label: "明日" },
          ];
          var h =
            '<div class="min-h-full px-5 py-6 pb-10">' +
            '<header class="mx-auto max-w-4xl">' +
            '<p class="text-xs font-medium uppercase tracking-widest text-zinc-400">Producer Dashboard · Mock</p>' +
            '<h1 class="mt-1 text-2xl font-semibold tracking-tight text-zinc-900">《Soda_MV》成都外景组</h1>' +
            '<p class="mt-1 text-sm text-zinc-500">按成员分组的当日任务 · 点击卡片循环：未完成 → AI 确认 → 人类已核实</p>' +
            '<div class="mt-6 flex flex-wrap items-center gap-2">' +
            '<span class="mr-2 text-xs font-medium text-zinc-400">时间</span>';
          dayBtns.forEach(function (b) {
            var active =
              day === b.key
                ? "bg-zinc-900 text-white shadow-sm"
                : "bg-white text-zinc-600 ring-1 ring-zinc-200/80 hover:bg-zinc-50";
            h +=
              '<button type="button" data-day="' +
              b.key +
              '" class="rounded-full px-4 py-1.5 text-sm font-medium transition-all ' +
              active +
              '">' +
              b.label +
              "</button>";
          });
          h += '</div></header><main class="mx-auto mt-8 max-w-4xl space-y-8">';

          groups.forEach(function (g) {
            h +=
              '<section><div class="mb-3 flex items-center justify-between gap-3">' +
              '<h2 class="text-sm font-semibold text-zinc-800">' +
              esc(g.name) +
              '</h2><button type="button" data-add="' +
              esc(g.id) +
              '" class="flex h-8 w-8 items-center justify-center rounded-full bg-white text-zinc-600 ring-1 ring-zinc-200 transition hover:bg-zinc-50 hover:text-zinc-900" aria-label="添加任务">' +
              iconPlus() +
              "</button></div><ul class="space-y-2.5">";

            g.tasks.forEach(function (task) {
              var showTag = day === "today" && task.carriedOver;
              var st = task.status;
              var titleCls = st === 3 ? "text-white" : "text-zinc-900";
              var icon =
                st === 1
                  ? iconCircle()
                  : st === 2
                    ? iconCheckCircle2()
                    : iconCheck();
              h +=
                '<li><div role="button" tabindex="0" data-cycle="' +
                esc(g.id) +
                "|" +
                esc(task.id) +
                '" class="group relative w-full cursor-pointer rounded-2xl px-4 py-3.5 text-left transition hover:brightness-[1.02] active:scale-[0.99] ' +
                shellClass(st) +
                '">' +
                '<button type="button" data-del="' +
                esc(g.id) +
                "|" +
                esc(task.id) +
                '" class="absolute right-3 top-3 z-10 flex h-7 w-7 items-center justify-center rounded-full bg-black/5 text-zinc-500 opacity-70 transition hover:bg-black/10 hover:opacity-100">' +
                iconX() +
                '</button><div class="flex gap-3 pr-9"><div class="mt-0.5 shrink-0">' +
                icon +
                '</div><div class="min-w-0 flex-1"><div class="flex flex-wrap items-center gap-2">';
              if (showTag) {
                h +=
                  '<span class="rounded-md bg-red-500 px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wide text-white">昨日顺延</span>';
              }
              h +=
                '<p class="text-[15px] font-medium leading-snug ' +
                titleCls +
                '">' +
                esc(task.title) +
                "</p></div>";
              if (st === 2) {
                h +=
                  '<div class="mt-2 flex flex-wrap items-center gap-2 text-xs">' +
                  '<span class="inline-flex items-center gap-1 rounded-full bg-white/70 px-2 py-0.5 font-medium text-amber-900 ring-1 ring-amber-200/60">' +
                  iconBot() +
                  " AI 已确认</span>" +
                  '<span class="text-amber-800/80">· 龙虾识别</span>' +
                  '<span class="text-zinc-500">待老板终审</span></div>';
              } else if (st === 3) {
                h +=
                  '<p class="mt-2 text-sm font-bold tracking-wide text-white/95">✅ 已核实</p>';
              } else {
                h +=
                  '<p class="mt-1.5 text-xs text-zinc-400">未完成 · 点击卡片推进状态</p>';
              }
              h += "</div></div></div></li>";
            });
            h += "</ul></section>";
          });

          h += "</main></div>";
          root.innerHTML = h;

          root.querySelectorAll("[data-day]").forEach(function (btn) {
            btn.addEventListener("click", function () {
              day = btn.getAttribute("data-day");
              render();
            });
          });
          root.querySelectorAll("[data-add]").forEach(function (btn) {
            btn.addEventListener("click", function (e) {
              e.stopPropagation();
              var gid = btn.getAttribute("data-add");
              groups.forEach(function (g) {
                if (g.id === gid) {
                  g.tasks.push({ id: uid(), title: "新任务（演示）", status: 1 });
                }
              });
              render();
            });
          });
          root.querySelectorAll("[data-del]").forEach(function (btn) {
            btn.addEventListener("click", function (e) {
              e.stopPropagation();
              var parts = btn.getAttribute("data-del").split("|");
              var gid = parts[0];
              var tid = parts[1];
              groups.forEach(function (g) {
                if (g.id === gid) {
                  g.tasks = g.tasks.filter(function (t) {
                    return t.id !== tid;
                  });
                }
              });
              render();
            });
          });
          root.querySelectorAll("[data-cycle]").forEach(function (el) {
            function go() {
              var parts = el.getAttribute("data-cycle").split("|");
              var gid = parts[0];
              var tid = parts[1];
              groups.forEach(function (g) {
                if (g.id === gid) {
                  g.tasks.forEach(function (t) {
                    if (t.id === tid) t.status = nextStatus(t.status);
                  });
                }
              });
              render();
            }
            el.addEventListener("click", function (e) {
              if (e.target.closest("[data-del]")) return;
              go();
            });
            el.addEventListener("keydown", function (e) {
              if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                go();
              }
            });
          });
        }

        function esc(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/"/g, "&quot;");
        }

        render();
      })();
    </script>
  </body>
</html>
